<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema de Control de Asistencia con QR</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f7fb;
padding:20px;
}

.container{
max-width:1400px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:20px;
color:#1e3a8a;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
margin-bottom:20px;
}

.form-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

input,select{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:8px;
}

button{
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.btn-primary{
background:#2563eb;
color:white;
}

.btn-danger{
background:#dc2626;
color:white;
}

.btn-success{
background:#16a34a;
color:white;
}

.btn-warning{
background:#f59e0b;
color:white;
}

.actions{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:15px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#1e3a8a;
color:white;
}

.student-photo{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
}

.qr-mini{
width:90px;
height:90px;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
justify-content:center;
align-items:center;
z-index:999;
}

.modal-content{
background:white;
padding:20px;
border-radius:15px;
max-width:900px;
width:95%;
}

.carnet{
width:750px;
max-width:100%;
background:white;
border-radius:15px;
overflow:hidden;
border:2px solid #1e3a8a;
}

.carnet-header{
background:#1e3a8a;
color:white;
padding:15px;
text-align:center;
}

.carnet-body{
display:flex;
padding:20px;
gap:20px;
align-items:center;
}

.carnet-photo{
width:150px;
height:180px;
object-fit:cover;
border:3px solid #1e3a8a;
}

.carnet-info{
flex:1;
}

.carnet-info h3{
color:#1e3a8a;
margin-bottom:10px;
}

#reader{
width:300px;
margin:auto;
}

@media(max-width:768px){

.carnet-body{
flex-direction:column;
}

table{
font-size:12px;
overflow-x:auto;
display:block;
}

}

</style>
</head>
<body>

<div class="container">

<h1>CONTROL DE ASISTENCIA DE ALUMNOS</h1>

<div class="card">

<h2>Registro de Estudiantes</h2>

<form id="studentForm">

<div class="form-grid">

<input type="text" id="nombres" placeholder="Nombres" required>

<input type="text" id="apellidos" placeholder="Apellidos" required>

<input type="text" id="dni" placeholder="DNI" required>

<input type="text" id="telefono" placeholder="Teléfono" required>

<input type="text" id="carrera" placeholder="Carrera Profesional" required>

<select id="genero">
<option>Masculino</option>
<option>Femenino</option>
<option>Otro</option>
</select>

<select id="ciclo">
<option>1er Ciclo</option>
<option>2do Ciclo</option>
<option>3er Ciclo</option>
<option>4to Ciclo</option>
<option>5to Ciclo</option>
<option>6to Ciclo</option>
<option>7mo Ciclo</option>
<option>8vo Ciclo</option>
<option>9no Ciclo</option>
<option>10mo Ciclo</option>
</select>

<input type="file" id="foto" accept=".png,.jpg,.jpeg" required>

</div>

<div class="actions">
<button type="submit" class="btn-primary">
Registrar Estudiante
</button>
</div>

</form>

</div>

<div class="card">

<h2>Estudiantes Registrados</h2>

<div class="actions">

<button class="btn-success" onclick="exportExcel()">
Exportar Excel
</button>

</div>

<table id="studentTable">

<thead>
<tr>
<th>Foto</th>
<th>Nombres</th>
<th>Apellidos</th>
<th>DNI</th>
<th>Carrera</th>
<th>Género</th>
<th>Ciclo</th>
<th>QR</th>
<th>Acciones</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>

<!-- MODAL CARNET -->

<div class="modal" id="modal">

<div class="modal-content">

<div id="carnet" class="carnet">

<div class="carnet-header">
<h2>CARNET UNIVERSITARIO</h2>
</div>

<div class="carnet-body">

<img id="cardPhoto" class="carnet-photo">

<div class="carnet-info">

<h3 id="cardName"></h3>

<p><b>DNI:</b> <span id="cardDni"></span></p>
<p><b>Carrera:</b> <span id="cardCarrera"></span></p>
<p><b>Ciclo:</b> <span id="cardCiclo"></span></p>

</div>

<div id="cardQR"></div>

</div>

</div>

<br>

<h3>Escáner QR</h3>

<div id="reader"></div>

<br>

<div class="actions">

<button class="btn-success" onclick="exportPNG()">
Exportar PNG
</button>

<button class="btn-warning" onclick="exportPDF()">
Exportar PDF
</button>

<button class="btn-danger" onclick="closeModal()">
Cerrar
</button>

</div>

</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>

let students =
JSON.parse(localStorage.getItem("students")) || [];

const form =
document.getElementById("studentForm");

form.addEventListener("submit", function(e){

e.preventDefault();

const file =
document.getElementById("foto").files[0];

if(!file){
alert("Seleccione una foto");
return;
}

const reader = new FileReader();

reader.onload = function(){

const student = {

id: Date.now(),

nombres:
document.getElementById("nombres").value,

apellidos:
document.getElementById("apellidos").value,

dni:
document.getElementById("dni").value,

telefono:
document.getElementById("telefono").value,

carrera:
document.getElementById("carrera").value,

genero:
document.getElementById("genero").value,

ciclo:
document.getElementById("ciclo").value,

foto: reader.result

};

students.push(student);

saveData();

form.reset();

renderTable();

};

reader.readAsDataURL(file);

});

function saveData(){
localStorage.setItem(
"students",
JSON.stringify(students)
);
}

function renderTable(){

const tbody =
document.querySelector("#studentTable tbody");

tbody.innerHTML="";

students.forEach(student=>{

const tr =
document.createElement("tr");

tr.innerHTML=`

<td>
<img src="${student.foto}"
class="student-photo">
</td>

<td>${student.nombres}</td>

<td>${student.apellidos}</td>

<td>${student.dni}</td>

<td>${student.carrera}</td>

<td>${student.genero}</td>

<td>${student.ciclo}</td>

<td>
<div id="qr-${student.id}"></div>
</td>

<td>

<button class="btn-warning"
onclick="showCard(${student.id})">
Carnet
</button>

<button class="btn-danger"
onclick="deleteStudent(${student.id})">
Eliminar
</button>

</td>

`;

tbody.appendChild(tr);

new QRCode(
document.getElementById(`qr-${student.id}`),
{
text: student.dni,
width:80,
height:80
}
);

});

}

function deleteStudent(id){

if(confirm("¿Eliminar estudiante?")){

students=
students.filter(
s=>s.id!==id
);

saveData();
renderTable();

}

}

let currentStudent=null;

function showCard(id){

currentStudent=
students.find(s=>s.id===id);

document.getElementById("modal").style.display="flex";

document.getElementById("cardPhoto").src=
currentStudent.foto;

document.getElementById("cardName").innerText=
currentStudent.nombres+" "+currentStudent.apellidos;

document.getElementById("cardDni").innerText=
currentStudent.dni;

document.getElementById("cardCarrera").innerText=
currentStudent.carrera;

document.getElementById("cardCiclo").innerText=
currentStudent.ciclo;

document.getElementById("cardQR").innerHTML="";

new QRCode(
document.getElementById("cardQR"),
{
text: JSON.stringify(currentStudent),
width:150,
height:150
}
);

startScanner();

}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function exportExcel(){

const data = students.map(s=>({

Nombres:s.nombres,
Apellidos:s.apellidos,
DNI:s.dni,
Telefono:s.telefono,
Carrera:s.carrera,
Genero:s.genero,
Ciclo:s.ciclo

}));

const ws=
XLSX.utils.json_to_sheet(data);

const wb=
XLSX.utils.book_new();

XLSX.utils.book_append_sheet(
wb,
ws,
"Alumnos"
);

XLSX.writeFile(
wb,
"alumnos.xlsx"
);

}

async function exportPNG(){

const canvas=
await html2canvas(
document.getElementById("carnet")
);

const link=
document.createElement("a");

link.download="carnet.png";

link.href=
canvas.toDataURL();

link.click();

}

async function exportPDF(){

const canvas=
await html2canvas(
document.getElementById("carnet")
);

const img=
canvas.toDataURL("image/png");

const { jsPDF } = window.jspdf;

const pdf=
new jsPDF();

pdf.addImage(
img,
"PNG",
10,
10,
180,
90
);

pdf.save("carnet.pdf");

}

function startScanner(){

if(window.qrScannerLoaded)
return;

window.qrScannerLoaded=true;

const scanner =
new Html5QrcodeScanner(
"reader",
{
fps:10,
qrbox:250
}
);

scanner.render(
(msg)=>{
alert("QR Detectado: "+msg);
},
(err)=>{}
);

}

renderTable();

</script>

</body>
</html>
